name: Deploy v2.x

on:
  workflow_dispatch: {}  # Allows you to run manually from GitHub UI
  # or
  # push:
  #   branches:
  #     - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      # Configure AWS credentials using GitHub Actions secrets
      # Make sure you have AWS_ACCESS_KEY_ID and AWS_SECRET_ACCESS_KEY in your repo secrets
      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Install jq
        run: |
          sudo apt-get update
          sudo apt-get install -y jq

      - name: Deploy CloudFormation and Start CodeBuild
        id: deploy
        env:
          # -------------------------------
          # Adjust these default parameters as needed
          # or pass them as environment variables/secrets.
          # -------------------------------
          ALLOW_SELF_REGISTER: "true"
          ENABLE_LAMBDA_SNAPSTART: "false"
          DISABLE_IPV6: "true"
          IPV4_RANGES: "10.0.0.0/24"            
          IPV6_RANGES: ""            
          ALLOWED_SIGN_UP_EMAIL_DOMAINS: "" 
          BEDROCK_REGION: "us-east-1"
          CDK_JSON_OVERRIDE: "{}"
          REPO_URL: "https://github.com/aws-samples/bedrock-claude-chat.git"
          VERSION: "v2"
          STACK_NAME: "CodeBuildForDeploy"
        run: |
          set -e

          echo "Skipping interactive v2.x readiness prompt because this is CI."
          echo "Assuming you've already read the migration guide."

          # Validate the template
          echo "Validating CloudFormation template..."
          aws cloudformation validate-template --template-body file://deploy.yml

          echo "Deploying CloudFormation stack..."
          aws cloudformation deploy \
            --stack-name "$STACK_NAME" \
            --template-file deploy.yml \
            --capabilities CAPABILITY_IAM \
            --parameter-overrides \
              AllowSelfRegister=$ALLOW_SELF_REGISTER \
              EnableLambdaSnapStart=$ENABLE_LAMBDA_SNAPSTART \
              DisableIpv6=$DISABLE_IPV6 \
              Ipv4Ranges="$IPV4_RANGES" \
              Ipv6Ranges="$IPV6_RANGES" \
              AllowedSignUpEmailDomains="$ALLOWED_SIGN_UP_EMAIL_DOMAINS" \
              BedrockRegion="$BEDROCK_REGION" \
              CdkJsonOverride="$CDK_JSON_OVERRIDE" \
              RepoUrl="$REPO_URL" \
              Version="$VERSION"

          echo "Waiting for the stack creation/update to complete..."
          # You can also use aws cloudformation wait stack-create-complete here.
          # We'll do a manual loop to mirror the script's style:

          spin='-\|/'
          i=0
          while true; do
              status=$(aws cloudformation describe-stacks \
                --stack-name "$STACK_NAME" \
                --query 'Stacks[0].StackStatus' --output text 2>/dev/null || echo "UNKNOWN")
              
              if [[ "$status" == "CREATE_COMPLETE" || "$status" == "UPDATE_COMPLETE" || "$status" == "DELETE_COMPLETE" ]]; then
                  break
              elif [[ "$status" == "ROLLBACK_COMPLETE" || "$status" == "DELETE_FAILED" || "$status" == "CREATE_FAILED" ]]; then
                  echo "Stack creation/update failed with status: $status"
                  exit 1
              fi

              printf "\r${spin:i++%${#spin}:1}"
              sleep 3
          done
          echo -e "\nStack status: $status"

          # Grab outputs
          outputs=$(aws cloudformation describe-stacks --stack-name "$STACK_NAME" --query 'Stacks[0].Outputs')
          projectName=$(echo "$outputs" | jq -r '.[] | select(.OutputKey=="ProjectName").OutputValue')

          if [[ -z "$projectName" || "$projectName" == "null" ]]; then
              echo "Failed to retrieve the CodeBuild project name from the stack outputs."
              exit 1
          fi

          echo "Starting CodeBuild project: $projectName"
          buildId=$(aws codebuild start-build --project-name "$projectName" --query 'build.id' --output text)

          if [[ -z "$buildId" ]]; then
              echo "Failed to start CodeBuild project"
              exit 1
          fi

          echo "Waiting for CodeBuild project to complete..."
          while true; do
              buildStatus=$(aws codebuild batch-get-builds \
                --ids "$buildId" --query 'builds[0].buildStatus' --output text)
              
              if [[ "$buildStatus" == "SUCCEEDED" || "$buildStatus" == "FAILED" || "$buildStatus" == "STOPPED" ]]; then
                  break
              fi
              sleep 10
          done

          echo "CodeBuild project completed with status: $buildStatus"
          if [[ "$buildStatus" != "SUCCEEDED" ]]; then
              echo "CodeBuild failed or was stopped."
              exit 1
          fi

          # Fetch logs for the final output
          buildDetail=$(aws codebuild batch-get-builds \
            --ids "$buildId" \
            --query 'builds[0].logs.{groupName: groupName, streamName: streamName}' \
            --output json)

          logGroupName=$(echo "$buildDetail" | jq -r '.groupName')
          logStreamName=$(echo "$buildDetail" | jq -r '.streamName')

          echo "CDK Deployment logs are in Log Group: $logGroupName / Stream: $logStreamName"

          # Attempt to grab the 'FrontendURL' from the logs
          # This assumes your logs contain the line "FrontendURL = ..."
          # If your pattern differs, adjust the grep/cut logic
          echo "Fetching final CloudWatch logs for Frontend URL..."
          aws logs get-log-events \
            --log-group-name "$logGroupName" \
            --log-stream-name "$logStreamName" > build-logs.json

          # Extract the 'FrontendURL' if it appears as 'FrontendURL = ...'
          frontendUrl=$(cat build-logs.json | \
            jq -r '.events[].message' | \
            grep -o 'FrontendURL = [^ ]*' | cut -d' ' -f3 | tr -d '\n,')

          if [[ -z "$frontendUrl" ]]; then
            echo "Could not find 'FrontendURL' in the logs. Check your build logs manually."
          else
            echo "Frontend URL: $frontendUrl"
          fi

      - name: Show final result
        if: always()
        run: |
          echo "Deployment job is done."
